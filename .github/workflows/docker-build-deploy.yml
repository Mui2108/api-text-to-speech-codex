name: Speech API Docker Build & Deploy

on:
  push:
    branches:
      - main
      - work
    paths:
      - 'speech-api/**'
      - 'docker-compose.yml'
      - '.github/workflows/docker-build-deploy.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create speech-api .env
        run: |
          cat > speech-api/.env <<EOF_ENV
          ELEVENLABS_API_KEY=${{ secrets.ELEVENLABS_API_KEY }}
          ELEVENLABS_MODEL_ID=scribe_v1
          UPLOAD_DIR=uploads
          MAX_UPLOAD_SIZE_MB=200
          CORS_ORIGINS=*
          EOF_ENV

      - name: Deploy speech-api
        run: docker compose up -d --build --force-recreate speech-api

      - name: Cleanup dangling images
        run: docker image prune -f
