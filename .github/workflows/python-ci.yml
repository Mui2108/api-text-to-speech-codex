name: Speech API CI

on:
  push:
    branches:
      - main
      - work
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: speech-api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: speech-api/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate source compilation
        run: python -m compileall app
